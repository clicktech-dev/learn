<!DOCTYPE HTML>  
<html>
<body>
  <link rel="stylesheet" href="https://s.pageclip.co/v1/pageclip.css" media="screen">
<h1>Feedback: Learn Dora</h1>
<p>We want to her your feedback!</p>
<p>Your feedback helps us alot, so thats why we want to hear from you.</p>

<h2>Feedback</h2>
  <form action="https://send.pageclip.co/Ur9JDJNvuOFnmL7m93ty0Mm217N2JCS1/TEST" class="pageclip-form" method="post">
    <!-- Replace these inputs with your own. Make sure they have a "name" attribute! -->
    <h3>Your Name:</h3>
    <input type="text" name="name" value="" /><br>
    <h3>Your Email:</h3>
    <input type="email" name="email" value="" /><br>
    <h3>Give some feedback back:</h3>
    <textarea name="body"></textarea><br>
    <h3>Can we respond to you about your feedback, if needed:</h3>
    <p>We just may need to contact you so this may be needed.</p>
    <input type="radio" name="respond" value="Yes" id="Yes" checked/>
    <label htmlFor="Yes">Yes</label>
  
    <input type="radio" name="respond" value="No" id="No"/>
    <label htmlFor="No">No</label><br>

    <!-- This button will have a loading spinner. Keep the inner span for best results. -->
    <button type="submit" class="pageclip-form__submit">
      <span>Send</span>
    </button>
  </form>

  <script src="https://s.pageclip.co/v1/pageclip.js" charset="utf-8"></script>
</body>
</html>
